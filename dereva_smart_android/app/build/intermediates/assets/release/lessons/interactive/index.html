<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Road Signs Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .score-item {
            text-align: center;
        }
        
        .score-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-top: 5px;
        }
        
        .question-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        
        .question-number {
            font-size: 14px;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }
        
        .sign-display {
            text-align: center;
            font-size: 80px;
            margin: 20px 0;
            padding: 30px;
            background: white;
            border-radius: 10px;
            border: 3px solid #667eea;
        }
        
        .options {
            display: grid;
            gap: 12px;
        }
        
        .option-btn {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: left;
        }
        
        .option-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateX(5px);
        }
        
        .option-btn.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }
        
        .option-btn.wrong {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }
        
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        
        .feedback.show {
            display: block;
        }
        
        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #4caf50;
        }
        
        .feedback.wrong {
            background: #ffebee;
            color: #c62828;
            border: 2px solid #f44336;
        }
        
        .next-btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            display: none;
        }
        
        .next-btn.show {
            display: block;
        }
        
        .next-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .completion-card {
            text-align: center;
            display: none;
        }
        
        .completion-card.show {
            display: block;
        }
        
        .completion-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .completion-title {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .completion-score {
            font-size: 48px;
            font-weight: bold;
            color: #4caf50;
            margin: 20px 0;
        }
        
        .completion-message {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }
        
        .restart-btn {
            padding: 15px 40px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .restart-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚦 Road Signs Quiz</h1>
        <p class="subtitle">Test your knowledge of NTSA road signs</p>
        
        <div class="score-board">
            <div class="score-item">
                <div class="score-label">Question</div>
                <div class="score-value" id="current-question">1</div>
            </div>
            <div class="score-item">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Total</div>
                <div class="score-value" id="total">5</div>
            </div>
        </div>
        
        <div id="quiz-container">
            <div class="question-card">
                <div class="question-number" id="question-number">Question 1 of 5</div>
                <div class="question-text" id="question-text"></div>
                <div class="sign-display" id="sign-display"></div>
                <div class="options" id="options"></div>
                <div class="feedback" id="feedback"></div>
                <button class="next-btn" id="next-btn">Next Question →</button>
            </div>
        </div>
        
        <div class="completion-card" id="completion-card">
            <div class="completion-icon">🎉</div>
            <div class="completion-title">Quiz Complete!</div>
            <div class="completion-score" id="final-score"></div>
            <div class="completion-message" id="completion-message"></div>
            <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
        </div>
    </div>
    
    <script>
        const questions = [
            {
                sign: "🛑",
                question: "What does this sign mean?",
                options: ["Stop", "Yield", "No Entry", "Speed Limit"],
                correct: 0,
                explanation: "This is a STOP sign. You must come to a complete stop before proceeding."
            },
            {
                sign: "⚠️",
                question: "What type of sign is this?",
                options: ["Regulatory", "Warning", "Information", "Temporary"],
                correct: 1,
                explanation: "This is a WARNING sign. It alerts drivers to potential hazards ahead."
            },
            {
                sign: "🚸",
                question: "What does this sign indicate?",
                options: ["School Zone", "Pedestrian Crossing", "Children Playing", "All of the above"],
                correct: 3,
                explanation: "This sign indicates areas where children may be present, including school zones and crossings."
            },
            {
                sign: "🚫",
                question: "What does this sign mean?",
                options: ["No Parking", "No Entry", "No Stopping", "Prohibited"],
                correct: 1,
                explanation: "This is a NO ENTRY sign. Vehicles are not allowed to enter this area."
            },
            {
                sign: "➡️",
                question: "What does this sign indicate?",
                options: ["Turn Right", "One Way", "Keep Right", "Exit"],
                correct: 1,
                explanation: "This is a ONE WAY sign. Traffic flows in the direction of the arrow only."
            }
        ];
        
        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        
        function loadQuestion() {
            answered = false;
            const q = questions[currentQuestion];
            
            document.getElementById('question-number').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
            document.getElementById('current-question').textContent = currentQuestion + 1;
            document.getElementById('question-text').textContent = q.question;
            document.getElementById('sign-display').textContent = q.sign;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });
            
            document.getElementById('feedback').classList.remove('show', 'correct', 'wrong');
            document.getElementById('next-btn').classList.remove('show');
        }
        
        function checkAnswer(selected) {
            if (answered) return;
            answered = true;
            
            const q = questions[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');
            const feedback = document.getElementById('feedback');
            
            buttons.forEach((btn, index) => {
                btn.disabled = true;
                if (index === q.correct) {
                    btn.classList.add('correct');
                }
                if (index === selected && selected !== q.correct) {
                    btn.classList.add('wrong');
                }
            });
            
            if (selected === q.correct) {
                score++;
                document.getElementById('score').textContent = score;
                feedback.textContent = '✓ Correct! ' + q.explanation;
                feedback.classList.add('show', 'correct');
            } else {
                feedback.textContent = '✗ Incorrect. ' + q.explanation;
                feedback.classList.add('show', 'wrong');
            }
            
            document.getElementById('next-btn').classList.add('show');
        }
        
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showCompletion();
            }
        }
        
        function showCompletion() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('completion-card').classList.add('show');
            
            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('final-score').textContent = `${score}/${questions.length}`;
            
            let message = '';
            if (percentage >= 80) {
                message = '🌟 Excellent! You have a great understanding of road signs!';
            } else if (percentage >= 60) {
                message = '👍 Good job! Keep practicing to improve your knowledge.';
            } else {
                message = '📚 Keep studying! Review the road signs and try again.';
            }
            
            document.getElementById('completion-message').textContent = message;
        }
        
        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            document.getElementById('score').textContent = '0';
            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('completion-card').classList.remove('show');
            loadQuestion();
        }
        
        document.getElementById('next-btn').onclick = nextQuestion;
        
        // Load first question
        loadQuestion();
    </script>
</body>
</html>
